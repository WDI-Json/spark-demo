# Delta Lake op Spark 4 (Scala 2.13). Wel beschikbaar via Maven, maar default
# catalog blijft Spark — Delta gebruik je per tabel met `USING DELTA`. Reden:
# als DeltaCatalog het default catalog overneemt loopt dbt-spark tegen
# klasse-loader-issues bij CREATE TABLE.
spark.jars.packages                       io.delta:delta-spark_2.13:4.0.0

# Ivy cache naar /tmp — de apache/spark container draait als user 185 zonder
# schrijfbare home, dus zonder deze override faalt --packages resolutie.
spark.jars.ivy                            /tmp/.ivy2

# Resource-limieten per Spark-applicatie. Zonder deze grijpt de eerste app
# (thrift) alle worker-cores en hangt connect zonder executor.
spark.cores.max                           1
spark.executor.cores                      1
spark.executor.memory                     512m

# Warehouse-pad binnen de pod (geen persistent volume in v1 — state weg bij restart)
spark.sql.warehouse.dir                   /tmp/spark-warehouse

# Thrift Server: NOSASL zodat dbt-spark kan verbinden zonder system-libsasl
spark.hadoop.hive.server2.authentication  NOSASL
spark.sql.hive.thriftServer.singleSession true

# Spark Connect: bind op alle interfaces zodat port-forward werkt
spark.connect.grpc.binding.host           0.0.0.0
spark.connect.grpc.binding.port           15002
