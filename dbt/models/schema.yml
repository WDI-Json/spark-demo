version: 2

models:
  - name: stg_orders
    description: "Cleaned orders staging table"
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: amount
        tests:
          - not_null

  - name: revenue_per_day
    description: "Daily revenue aggregation"
    columns:
      - name: order_date
        tests:
          - unique
          - not_null
      - name: revenue
        tests:
          - not_null

  - name: top_customers
    description: "Customers with the highest revenue"
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: total_revenue
        tests:
          - not_null
